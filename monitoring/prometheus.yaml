# 1. Namespace dedicato
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
# 2. ConfigMap per la configurazione di Prometheus
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      # Esempio per monitorare i pod nel cluster
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
---
# 3. Deployment di Prometheus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-deployment
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-server
  template:
    metadata:
      labels:
        app: prometheus-server
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.47.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus/
            - name: prometheus-storage-volume
              mountPath: /prometheus
      volumes:
        - name: prometheus-config-volume
          configMap:
            defaultMode: 420
            name: prometheus-config
        - name: prometheus-storage-volume
          emptyDir: {} # Usa un volume persistente (PVC) per produzioni reali
---
# 4. Service per esporre Prometheus
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: monitoring
spec:
  type: NodePort # Usa LoadBalancer se sei su cloud pubblico
  ports:
    - port: 80
      targetPort: 9090
      nodePort: 30000 # Accessibile su <IP-Nodo>:30000
  selector:
    app: prometheus-server
