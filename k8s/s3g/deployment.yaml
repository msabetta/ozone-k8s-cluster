apiVersion: apps/v1
kind: Deployment
metadata:
  name: s3g
  namespace: ozone-cluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s3g
  template:
    metadata:
      labels:
        app: s3g
    spec:
      containers:
        - name: s3g
          image: apache/ozone:2.0.0
          command: ["ozone"]
          args: ["s3g"]
          ports:
            - containerPort: 9878
          env:
            - name: OZONE_OM_ADDRESS
              value: "om:9862"
            - name: OZONE_S3G_HTTP_ADDRESS
              value: "0.0.0.0:9878"
            - name: OZONE_HEAP_SIZE
              value: "256m"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"