apiVersion: apps/v1
kind: Deployment
metadata:
  name: scm
  namespace: ozone-cluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scm
  template:
    metadata:
      labels:
        app: scm
    spec:
      containers:
        - name: scm
          image: apache/ozone:latest
          command: ["ozone"]
          args: ["scm"]
          ports:
            - containerPort: 9876
          env:
            - name: OZONE_HEAP_SIZE
              value: "256m"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"