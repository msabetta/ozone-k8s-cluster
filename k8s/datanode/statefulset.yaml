apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: datanode
  namespace: ozone-cluster
spec:
  serviceName: datanode
  replicas: 1
  selector:
    matchLabels:
      app: datanode
  template:
    metadata:
      labels:
        app: datanode
    spec:
      containers:
      - name: datanode
        image: apache/ozone:2.0.0
        command: ["ozone"]
        args: ["datanode"]
        volumeMounts:
        - name: data
          mountPath: /data
        - name: ozone-config
          mountPath: /opt/hadoop/etc/hadoop
      volumes:
      - name: ozone-config
        configMap:
          name: ozone-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi