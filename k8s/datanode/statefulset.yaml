apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: datanode
  namespace: ozone-cluster
spec:
  serviceName: datanode
  replicas: 3
  selector:
    matchLabels:
      app: datanode
  template:
    metadata:
      labels:
        app: datanode
    spec:
      containers:
      - name: datanode
        image: apache/ozone:latest
        command: ["ozone"]
        args: ["datanode"]
        ports:
        - containerPort: 9864
        env:
        - name: OZONE_SCM_NAMES
          value: scm
        volumeMounts:
        - name: data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi